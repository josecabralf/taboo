# agent-implement.yml — label-driven "implement an issue" workflow.
#
# AUTHORIZATION: gated by the `agent:implement` label. Applying a label requires
# write access, so the label IS the authorization — only someone trusted can
# kick off an agent run.
#
# ENGINE: the orchestration is a Go application — the `afk` binary, a nested Go
# module at .taboo/orchestrator built on pkg/taboo (taboo's own library). It does
# the whole loop:
#   1. fetch the issue
#   2. create a fresh git worktree+branch off main in a taboo-provisioned LXD
#      "workshop"
#   3. run the Claude Code agent (Opus on a Claude subscription via
#      CLAUDE_CODE_OAUTH_TOKEN), which commits in place and is push-denied
#   4. push the branch
#   5. open the draft PR
#   6. apply the agent:review label
# All GitHub I/O happens in Go (internal/ghio), never in this workflow's bash.
# This layer keeps only checkout/setup, token plumbing and label bookkeeping.
#
# VALIDATION: the workshop is derived from the project's own workshop.yaml
# (ADR 0009), so the agent runs `make lint test build` itself and converges to
# green before committing. The PR's CI (ci.yml) stays the authoritative gate.
#
# AGENT_PAT: labels applied with the default GITHUB_TOKEN do NOT trigger other
# workflows. So the agent:review label the orchestrator adds to the new PR is
# applied with a PAT (secrets.AGENT_PAT) — exported as GH_TOKEN below — to
# CASCADE into agent-review.yml.

name: agent-implement

on:
  issues:
    types: [labeled]

concurrency:
  group: agent-implement-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  implement:
    if: github.event.label.name == 'agent:implement'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      issues: write
      pull-requests: write
    env:
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Transition labels (claim the issue)
        run: |
          set -euo pipefail
          gh issue edit "$ISSUE_NUMBER" --remove-label agent:implement || true
          gh issue edit "$ISSUE_NUMBER" --remove-label agent:blocked || true
          gh issue edit "$ISSUE_NUMBER" --add-label agent:in-progress

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup environment (lxd + workshop)
        uses: ./.github/actions/setup-env

      - name: Run implement orchestrator
        # The afk orchestrator is a nested Go module (.taboo/orchestrator), so it
        # cannot be `go run ./.taboo/orchestrator` from the parent module (Go
        # excludes nested modules). Build it inside the module, then run the binary
        # from the repo root so it finds .taboo/taboo.yaml and treats the checkout
        # as the repository.
        #
        # GitHub I/O runs under the PAT (when available) so the agent:review label
        # the orchestrator applies cascades into agent-review.yml; the branch push
        # reuses the checkout's authenticated remote.
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.AGENT_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ( cd .taboo/orchestrator && go build -o "$RUNNER_TEMP/afk" . )
          "$RUNNER_TEMP/afk" implement --issue "$ISSUE_NUMBER"

      - name: Mark blocked on failure
        if: failure()
        run: |
          set -euo pipefail
          run_url="${GITHUB_SERVER_URL}/${GH_REPO}/actions/runs/${GITHUB_RUN_ID}"
          gh issue edit "$ISSUE_NUMBER" --add-label agent:blocked || true
          gh issue comment "$ISSUE_NUMBER" --body "$(printf 'The implement orchestrator failed.\n\nRun: %s\n\nRe-add the `agent:implement` label to retry.' "$run_url")" || true

      - name: Always remove in-progress label
        if: always()
        run: |
          gh issue edit "$ISSUE_NUMBER" --remove-label agent:in-progress || true

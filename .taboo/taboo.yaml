# taboo.yaml — taboo dogfooding itself (issue #62).
#
# Single source of truth for the AFK agent loop. The GitHub Actions in
# .github/workflows/agent-implement.yml and agent-review.yml drive these
# workflows with `taboo run <name> --vars-file …`. taboo owns the worktree,
# the workshop, and the git-push-denied agent; the workflow layer owns all
# GitHub integration (issue/diff fetch, branch push, PR, labels). taboo core
# stays frozen — this is all config, prompts, and skills around `taboo run`.
#
# Validate with `taboo validate`.
workshop: taboo
base: ubuntu@24.04
repo: .
agent: opencode
model: openrouter/qwen/qwen3.7-max
strategy: branch
defaults:
  branch-prefix: agent/
  timeout: 30m
  max-iterations: 1
workflows:
  implement:
    prompt-file: prompts/implement.md
    model: openrouter/qwen/qwen3.7-max
  review:
    prompt-file: prompts/review.md
    model: openrouter/qwen/qwen3-coder-plus

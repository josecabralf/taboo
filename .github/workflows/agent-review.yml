# Label-driven review workflow (issue #62 dogfooding loop).
#
# AUTHORIZATION: gated by the `agent:review` label. Only a maintainer with write
# access can apply it, so applying it is the act of trusting these inputs. The
# review agent's inputs (a diff produced by our own trusted implement agent) are
# inside the trust boundary. This workflow uses pull_request_target (it needs
# write tokens to post the review) and is therefore NOT hardened against
# untrusted public-fork PRs — running it on a fork PR would expose secrets. That
# trade-off is deliberate and documented in docs/explanation/dogfooding.md.
#
# ENGINE: the orchestration is a Go application — the `afk` binary, a nested Go
# module at .taboo/orchestrator built on pkg/taboo. `afk review --pr N` fetches
# the PR diff, runs the review workflow for a structured <result>, drops any
# inline comment whose path:line isn't on the RIGHT side of the diff (drop, never
# error), and posts exactly ONE PR review. All GitHub I/O happens in Go
# (internal/ghio), never in this workflow's bash. This layer keeps only
# checkout/setup, token plumbing, and label bookkeeping.
name: agent-review

on:
  pull_request_target:
    types: [labeled]

jobs:
  review:
    if: github.event.label.name == 'agent:review'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: agent-review-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    permissions:
      contents: read
      pull-requests: write
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Transition labels (review -> in-progress)
        run: |
          set -euo pipefail
          gh pr edit "$PR_NUMBER" --remove-label agent:review || true
          gh pr edit "$PR_NUMBER" --remove-label agent:blocked || true
          gh pr edit "$PR_NUMBER" --add-label agent:in-progress

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Run review orchestrator
        # The afk orchestrator is a nested Go module (.taboo/orchestrator), so it
        # cannot be `go run ./.taboo/orchestrator` from the parent module (Go
        # excludes nested modules). Build it inside the module, then run the binary
        # from the repo root so it finds .taboo/taboo.yaml and treats the checkout
        # as the repository. It fetches the diff, runs the review agent, filters
        # out-of-diff comments, and posts exactly one review — all in Go.
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -euo pipefail
          ( cd .taboo/orchestrator && go build -o "$RUNNER_TEMP/afk" . )
          "$RUNNER_TEMP/afk" review --pr "$PR_NUMBER"

      - name: Mark blocked on failure
        if: failure()
        run: |
          set -euo pipefail
          gh pr edit "$PR_NUMBER" --add-label agent:blocked || true
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh pr comment "$PR_NUMBER" --body "$(printf 'agent:review failed. See the run log: %s\n\nRe-add the `agent:review` label to retry.' "$run_url")"

      - name: Remove in-progress label
        if: always()
        run: |
          set -euo pipefail
          gh pr edit "$PR_NUMBER" --remove-label agent:in-progress || true

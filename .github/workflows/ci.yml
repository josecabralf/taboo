name: CI

on:
  push:
    branches: [main]
    # The library is the repo root module, released via an unprefixed v* tag; the
    # CLI is a subdir module, served only by a cli/-prefixed tag. See
    # docs/RELEASING.md.
    tags: ["v*", "cli/v*"]
  pull_request:
    branches: [main]

# A workshop launch is expensive (installs the go SDK + golangci-lint), so the
# whole pipeline runs in a single job: launch once, then drive each make target
# through `workshop run`. Each root make target fans out across all three modules
# (pkg, cli, afk), so a single run gates every module. The integration suite is
# intentionally not run here — it needs its own workshop + LXD, and nesting a
# workshop inside the CI workshop is problematic (see the Makefile's
# test-integration target).
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Lint
        run: workshop run -- make lint

      - name: Test
        run: workshop run -- make test

      - name: Build
        run: workshop run -- make build

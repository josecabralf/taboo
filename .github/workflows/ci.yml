name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# A workshop launch is expensive (installs the go SDK + golangci-lint), so the
# whole pipeline runs in a single job: launch once, then drive each make target
# through `workshop run`. The integration suite is intentionally not run here —
# it needs its own workshop + LXD, and nesting a workshop inside the CI workshop
# is problematic (see the Makefile's test-integration target).
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Lint
        run: workshop run -- make lint

      - name: Test
        run: workshop run -- make test

      - name: Build
        run: workshop run -- make build

      # The root ./... skips dot-directories, so the nested afk module at
      # .taboo/orchestrator is invisible to `make build/test`. Build, vet and
      # test it explicitly here so its agent-loop code is gated on every PR.
      - name: Orchestrator module (build/vet/test)
        run: workshop run -- bash -c 'cd .taboo/orchestrator && go build ./... && go vet ./... && go test ./...'
